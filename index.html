<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Personal Evolution</title>

  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- ===== MENU SUPERIOR ===== -->
<header class="top-menu">
  <button>Rotina</button>
  <button>Finanças</button>
  <button>House Project</button>
  <button>Meus livros</button>
  <button>Lembretes</button>
  <button>Estudos</button>
  <button>Frases</button>
  <button id="musicButton">Músicas</button>
</header>

<!-- ===== TELA PRINCIPAL ===== -->
<main id="mainScreen" class="screen main-screen">

  <!-- ===== BOTÕES ESQUERDA ===== -->
  <section class="left-buttons">
    <button>Meu Diário</button>
    <button>Metas</button>
    <button>Profile</button>
  </section>

  <!-- ===== CONSTELAÇÃO φ ===== -->
  <section id="constellation" class="constellation">

    <div class="star phi1"></div>
    <div class="star phi2"></div>
    <div class="star phi3"></div>
    <div class="star phi4"></div>
    <div class="star phi5"></div>
    <div class="star phi6"></div>
    <div class="star phi7"></div>
    <div class="star phi8"></div>
    <div class="star phi9"></div>
    <div class="star phi10"></div>
    <div class="star phi11"></div>
    <div class="star phi12"></div>
    <div class="star phi13"></div>

  </section>

  <!-- ===== PLANETAS ===== -->
  <img class="earth" src="images/Terra.png" alt="Planeta Terra">
  <img class="moon" src="images/Lua.webp" alt="Lua">

<!-- ===== CENÁRIOS DAS MÚSICAS ===== -->
<div id="musicSkyBackground" class="music-sky-background hidden"></div>

<!-- ===== BARCO DAGGER ===== -->
<img id="boatThorfinn" class="boat-thorfinn hidden" src="images/Boat.png" alt="Thorfinn no barco">

<!-- ===== BARCOS INTERWINED ===== -->
<img id="boatThors" class="music-boat boat-thors hidden" src="images/Thors.png" alt="Barco de Thors">

<img id="boatAskeladd" class="music-boat boat-askeladd hidden" src="images/Askeladd.png" alt="Barco de Askeladd">

<!-- ===== OCEANO ===== -->
<div class="ocean-container">
  <div class="ocean-layer ocean-back"></div>
  <div class="ocean-layer ocean-middle"></div>
  <div class="ocean-layer ocean-front"></div>
</div>
  
  </main>

<!-- ===== TELA DA CONSTELAÇÃO ===== -->
<section id="philosophyScreen" class="screen philosophy-screen hidden">

  <!-- ===== BOTÕES DA TELA FILOSOFIA ===== -->
  <div class="secret-buttons">
    <button>A verdade da existência</button>
    <button id="backButton">Voltar</button>
  </div>

  <!-- ===== CONSTELAÇÃO GRANDE φ ===== -->
  <div class="big-constellation">

    <div class="big-star big-phi1"></div>
    <div class="big-star big-phi2"></div>
    <div class="big-star big-phi3"></div>
    <div class="big-star big-phi4"></div>
    <div class="big-star big-phi5"></div>
    <div class="big-star big-phi6"></div>
    <div class="big-star big-phi7"></div>
    <div class="big-star big-phi8"></div>
    <div class="big-star big-phi9"></div>
    <div class="big-star big-phi10"></div>
    <div class="big-star big-phi11"></div>
    <div class="big-star big-phi12"></div>
    <div class="big-star big-phi13"></div>
    <div class="big-star big-phi14"></div>

    <svg class="phi-lines" viewBox="0 0 360 460">
      <path class="phi-line vertical-line"
        d="M180 25 L180 430"
      />

      <path class="phi-line circle-line"
        d="M180 85
           C70 85, 70 250, 180 250
           C290 250, 290 85, 180 85"
      />
    </svg>

  </div>

</section>

<!-- ===== TELA DE MÚSICAS ===== -->
<section id="musicScreen" class="screen music-screen hidden">

  <div class="music-title-area">
    <span>Músicas</span>
    <div class="music-wave"></div>
  </div>

  <div class="music-list">

    <div class="music-row volume-row">
      <span>Volume</span>
      <input id="musicVolume" type="range" min="0" max="100" value="60">
    </div>

    <div class="music-row">
      <span>Dagger</span>
      <button class="music-play-button" data-music="audio/Dagger.mpeg" data-boat="true">Tocar</button>
    </div>

    <div class="music-row">
      <span>Interwined</span>
      <button class="music-play-button" data-music="audio/Intertwined.mpeg">Tocar</button>
    </div>

    <div class="music-row">
      <span>Ethereal</span>
      <button class="music-play-button" data-music="audio/Thorfinn.mpeg">Tocar</button>
    </div>

  </div>

  <button id="musicBackButton" class="music-back-button">Voltar</button>

</section>

<audio id="clickSound"></audio>
<audio id="mysterySound"></audio>
<audio id="mainMusic" loop></audio>

  <script src="js/script.js"></script>
</body>
</html>
