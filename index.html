<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Personal Evolution</title>

  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ===== MENU SUPERIOR ===== -->
  <header class="top-menu">
    <button>Rotina</button>
    <button>Finanças</button>
    <button>House Project</button>
    <button>Meus livros</button>
    <button>Lembretes</button>
    <button>Estudos</button>
    <button>Frases</button>
    <button>Músicas</button>
  </header>

<!-- ===== TELA PRINCIPAL ===== -->
<main id="mainScreen" class="screen main-screen">

  <!-- ===== BOTÕES ESQUERDA ===== -->
  <section class="left-buttons">
    <button>Meu Diário</button>
    <button>Metas</button>
    <button>Profile</button>
  </section>

  <!-- ===== CONSTELAÇÃO φ ===== -->
  <section id="constellation" class="constellation">

    <div class="star phi1"></div>
    <div class="star phi2"></div>
    <div class="star phi3"></div>
    <div class="star phi4"></div>
    <div class="star phi5"></div>
    <div class="star phi6"></div>
    <div class="star phi7"></div>
    <div class="star phi8"></div>
    <div class="star phi9"></div>
    <div class="star phi10"></div>
    <div class="star phi11"></div>
    <div class="star phi12"></div>
    <div class="star phi13"></div>

  </section>

  <!-- ===== PLANETAS ===== -->
  <img class="earth" src="images/Terra.png" alt="Planeta Terra">
  <img class="moon" src="images/Lua.webp" alt="Lua">

  <!-- ===== OCEANO ===== -->
  <div class="ocean-container">
    <div class="ocean-layer ocean-back"></div>
    <div class="ocean-layer ocean-middle"></div>
    <div class="ocean-layer ocean-front"></div>
  </div>

</main>

  <!-- ===== TELA DA CONSTELAÇÃO ===== -->
  <section id="philosophyScreen" class="screen philosophy-screen hidden">

    <div class="secret-buttons">
      <button>A verdade da existência</button>
      <button id="backButton">Voltar</button>
    </div>

    <div class="big-constellation">
      <svg viewBox="0 0 300 400">
        <polyline points="130,30 120,120 190,130 190,40 130,30 200,350"
          fill="none"
          stroke="#00d9ff"
          stroke-width="3"
        />
      </svg>
    </div>

  </section>

  <audio id="clickSound" src=""></audio>
  <audio id="mysterySound" src=""></audio>

  <script src="js/script.js"></script>
</body>
</html>
